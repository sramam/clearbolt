<!doctype html>
<html>
  <head><title>Hidden phone fixture</title></head>
  <body>
    <h1>Sample Listing</h1>
    <div id="contactForm" style="display:none">
      <input type="tel" placeholder="Phone Number" />
    </div>
    <div class="disclaimer">
      <div class="hide-desktop">
        <div class="broker f-xxs">
          <div class="broker-card space-between">
            <div>
              <span class="f-14">Business Listed By:</span><br />
              Jane Broker
            </div>
            <div class="f-xs contact-phone-selector">
              <a id="hlViewTelephone_9999001" class="hlViewTelephone_9999001 showPhone">
                <span>Phone Number</span>
              </a>
              <span
                id="lblViewTpnTelephone_9999001"
                class="lblViewTpnTelephone_9999001 ctc_phone"
                style="display:none;"
              >
                <a href="tel:408-555-0199">408-555-0199</a>
              </span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
