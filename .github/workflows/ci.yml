name: ci
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.16.1
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install
      - name: Smoke ensure-playwright script (skip browser download in CI)
        run: CLEARBOLT_SKIP_PLAYWRIGHT_INSTALL=1 pnpm ensure:playwright
      - run: pnpm run verify:dependency-lag
      - run: pnpm lint
      - run: pnpm typecheck
      - name: Require OpenRouter API key (live dedup tests)
        run: node scripts/verify-openrouter-ci-secret.mjs
        env:
          CI: "true"
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      - name: Test (includes OpenRouter live dedup)
        run: pnpm test
        env:
          CI: "true"
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Pin for stable chat completions in CI; catalog resolution is still exercised by live tests that call GET /models.
          CLEARBOLT_DEDUP_LLM_MODEL: google/gemma-4-26b-a4b-it:free
      - run: pnpm lint:specs
