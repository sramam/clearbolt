name: ci
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.16.1
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install
      - name: Smoke ensure-playwright script (skip browser download in CI)
        run: CLEARBOLT_SKIP_PLAYWRIGHT_INSTALL=1 pnpm ensure:playwright
      - run: pnpm run verify:dependency-lag
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm lint:specs
