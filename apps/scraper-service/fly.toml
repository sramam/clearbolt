# Fly.io app for Playwright-backed BizBuySell scraping.
# Deploy: fly deploy --config apps/scraper-service/fly.toml
app = "clearbolt-scraper"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8791"

[http_service]
  internal_port = 8791
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 2
